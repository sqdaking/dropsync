function saveBackendUrl() {
  S.backendUrl = ($('burl')?.value || '').trim().replace(/\/+$/, '');
  save(); toast('Backend URL saved', 'success');
  updateStatus();
}

async function saveServerUrl() {
  const url = ($('surl')?.value || '').trim().replace(/\/+$/, '');
  S.serverUrl = url; save();
  if (!url) { toast('Server URL cleared', 'info'); return; }
  const statusEl = $('server-status');
  if (statusEl) statusEl.textContent = 'Testing connection...';
  try {
    const r = await fetch(url + '/');
    const d = await r.json();
    if (d.status === 'ok') {
      toast('✅ Railway server connected!', 'success');
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)">✅ Connected — ' + d.service + '</span>';
    } else throw new Error('Bad response');
  } catch(e) {
    toast('❌ Could not reach Railway server', 'error');
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">❌ Connection failed — check URL</span>';
  }
}

async function savePricingDefaults() {
  const markupVal   = parseFloat($('def-markup')?.value);
  const handlingVal = parseFloat($('def-handling')?.value);
  const qtyVal      = parseInt($('def-qty')?.value);
  if (isNaN(markupVal) || markupVal < 0) { toast('Markup must be a valid number (e.g. 23 for 23%)', 'error'); return; }
  S.markup      = markupVal;
  S.handlingCost = isNaN(handlingVal) ? 2 : handlingVal;
  S.quantity     = isNaN(qtyVal) ? 1 : qtyVal;
  save();

  // Push to Railway DB so the background worker uses the same values
  if (S.serverUrl) {
    try {
      await fetch(`${S.serverUrl}/api/settings/bulk`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          markup:       S.markup,
          handlingCost: S.handlingCost,
          quantity:     S.quantity,
        }),
      });
      toast('Pricing saved & synced to worker ✅', 'success');
    } catch(e) {
      toast('Pricing saved locally (Railway unreachable)', 'warn');
    }
  } else {
    toast('Pricing saved', 'success');
  }
}

function setSandboxMode(val) {
  S.sandboxMode = val;
  if (S.token) { S.token = null; S.refreshToken = null; S.tokenExpiry = null; }
  save(); renderSettings(); updateStatus();
  toast(val ? "🟡 Switched to Sandbox mode" : "🟢 Switched to Production mode", 'info');
}

async function connectEbay() {
  if (!S.backendUrl) { toast('Set Backend URL first in Settings', 'error'); return; }
  try {
    const r = await fetch(`${S.backendUrl}/api/ebay?action=auth&sandbox=${S.sandboxMode?'true':'false'}`);
    const d = await r.json();
    if (!d.url) throw new Error('No auth URL returned from backend');
    
    // Clear any stale pending auth
    try { localStorage.removeItem('ebay_auth_pending'); } catch(e) {}
    
    const popup = window.open(d.url, 'ebay-auth', 'width=600,height=700,left=200,top=100');
    if (!popup) { toast('Popup blocked — please allow popups for this site', 'error'); return; }

    let resolved = false;
    function applyAuth(data) {
      if (resolved) return;
      resolved = true;
      S.token = data.token; S.refreshToken = data.refresh; S.tokenExpiry = data.expiry;
      save(); updateStatus(); renderSettings(); setupAutoSync();
      toast('✅ Connected to eBay!', 'success');
      try { loadPolicies(); } catch(e) {}
    }

    // Method 1: postMessage from popup
    function msgHandler(e) {
      if (e.data?.type === 'ebay_auth') {
        window.removeEventListener('message', msgHandler);
        clearInterval(pollTimer);
        applyAuth(e.data);
        popup?.close();
      }
    }
    window.addEventListener('message', msgHandler);

    // Method 2: localStorage polling fallback (if opener was null in popup)
    const pollTimer = setInterval(function() {
      try {
        const pending = localStorage.getItem('ebay_auth_pending');
        if (pending) {
          localStorage.removeItem('ebay_auth_pending');
          window.removeEventListener('message', msgHandler);
          clearInterval(pollTimer);
          applyAuth(JSON.parse(pending));
          popup?.close();
        }
      } catch(e) {}
      // Stop polling after 5 minutes
      if (Date.now() > (window._authStart||Date.now()) + 300000) clearInterval(pollTimer);
    }, 500);
    window._authStart = Date.now();

  } catch (e) { toast(`Connect failed: ${e.message}`, 'error'); }
}

async function refreshToken() {
  try {
    const r = await fetch(`${S.backendUrl}/api/ebay?action=refresh`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: S.refreshToken }),
    });
    const d = await r.json();
    if (!d.access_token) throw new Error(d.error || 'Refresh failed');
    S.token = d.access_token; S.tokenExpiry = d.expiry || (Date.now() + 7000000);
    save(); renderSettings(); toast('Token refreshed', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

function disconnectEbay() {
  if (!confirm('Disconnect eBay?')) return;
  S.token = ''; S.refreshToken = ''; S.tokenExpiry = 0;
  save(); updateStatus(); renderSettings(); toast('Disconnected', 'info');
}

function forceReconnect() {
  if (!confirm('This will clear your current eBay token and re-authorize with full permissions (including inventory access). Continue?')) return;
  S.token = ''; S.refreshToken = ''; S.tokenExpiry = 0;
  save(); renderSettings();
  toast('Token cleared — re-authorizing...', 'info');
  setTimeout(() => connectEbay(), 500);
}

// ── ORDER RESYNC HELPERS ─────────────────────────────────────────────────────

// Called from an order card's 🔄 Resync button — uses existing matched product
async function reviseFromOrder(productId, orderIdSafe, btn) {
  const p = S.products?.find(x => x.id === productId);
  if (!p) { toast('Product not found in catalog', 'error'); return; }
  if (!p.sourceUrl) { toast('No Amazon URL linked to this product', 'error'); return; }
  if (!p.ebaySku || p.ebaySku.startsWith('DS-RECOVERED') || p.ebaySku.startsWith('DS-EXISTING')) {
    toast('Real eBay SKU needed — go to Settings → Recover SKUs first', 'warn', 5000); return;
  }
  if (!S.token) { toast('Connect eBay first', 'error'); return; }

  const orig = btn.textContent;
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;
  try {
    const token = await ensureToken();
    const r = await fetch(`${S.backendUrl}/api/ebay?action=revise`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: token,
        ebaySku: p.ebaySku,
        sourceUrl: p.sourceUrl,
        ebayListingId: p.ebayListingId,
        quantity: p.quantity || 1,
        markup: S.markup,
        handlingCost: S.handlingCost,
        sandbox: S.sandboxMode || false,
        fallbackImages: p.images || [],
        fallbackTitle: p.title || '',
        fallbackPrice: p.cost || p.price || 0,
        fallbackInStock: p.inStock !== false,
      })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    p.lastSynced = new Date().toISOString();
    if (d.price) { p.price = d.price; p.cost = d.price; }
    save();
    btn.textContent = '✅ Resynced!';
    btn.style.color = '#10b981';
    toast(`✅ Listing updated — ${d.images} photos, price $${d.price}, ${d.inStock ? 'In Stock' : 'Out of Stock'}`, 'success', 5000);
    addLog('sync', `Revised: ${p.title?.slice(0,50)}`, `${d.updated} variants updated via order card`, { productId: p.id });
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.color = ''; }, 4000);
  } catch(e) {
    btn.textContent = orig;
    btn.disabled = false;
    toast(`Resync failed: ${e.message}`, 'error', 6000);
  }
}

// Called when user pastes an Amazon URL into the input field on an order card
async function linkAndResync(productId, itemListingId, itemSku, orderIdSafe, url) {
  url = (url||'').trim();
  if (!url || !url.includes('amazon')) { toast('Paste a valid Amazon URL first', 'warn'); return; }
  if (!S.token) { toast('Connect eBay first', 'error'); return; }

  // Clean URL to dp/ASIN form
  const asinMatch = url.match(/\/dp\/([A-Z0-9]{10})/i) || url.match(/([A-Z0-9]{10})$/i);
  const cleanUrl = asinMatch ? `https://www.amazon.com/dp/${asinMatch[1]}` : url;
  const asin = asinMatch?.[1] || '';

  // Find or create product entry
  let p = S.products?.find(x => x.id === productId)
       || S.products?.find(x => x.ebayListingId === itemListingId)
       || S.products?.find(x => x.ebaySku === itemSku);

  if (!p && (itemListingId || itemSku)) {
    // Create a stub product to track this listing
    p = {
      id: uid(), title: `eBay listing ${itemListingId || itemSku}`,
      sourceUrl: cleanUrl, asin, status: 'listed',
      ebayListingId: itemListingId || '', ebaySku: itemSku || '',
      images: [], variations: [], hasVariations: false,
    };
    S.products = S.products || [];
    S.products.push(p);
    save();
  } else if (p) {
    p.sourceUrl = cleanUrl;
    if (asin) p.asin = asin;
    save();
  }

  if (!p) { toast('Could not find or create product entry', 'error'); return; }

  // If no real eBay SKU, prompt recovery first
  if (!p.ebaySku || p.ebaySku.startsWith('DS-RECOVERED') || p.ebaySku.startsWith('DS-EXISTING')) {
    // Save URL and re-render, but can't revise without real SKU
    toast('URL saved! Go to Settings → Recover SKUs to enable Resync.', 'info', 5000);
    renderOrderRows();
    return;
  }

  // Run revise inline
  const btn = document.querySelector(`#order-card-${orderIdSafe} button[onclick*="linkAndResync"]`);
  if (btn) { btn.textContent = '⏳ Linking & Syncing…'; btn.disabled = true; }
  try {
    const token = await ensureToken();
    const r = await fetch(`${S.backendUrl}/api/ebay?action=revise`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: token,
        ebaySku: p.ebaySku,
        sourceUrl: cleanUrl,
        ebayListingId: p.ebayListingId || itemListingId,
        quantity: p.quantity || 1,
        markup: S.markup,
        handlingCost: S.handlingCost,
        sandbox: S.sandboxMode || false,
        fallbackImages: p.images || [],
        fallbackTitle: p.title || '',
        fallbackPrice: p.cost || p.price || 0,
        fallbackInStock: p.inStock !== false,
      })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    p.lastSynced = new Date().toISOString();
    if (d.price) { p.price = d.price; p.cost = d.price; }
    save();
    toast(`✅ Linked & resynced — ${d.images} photos, price $${d.price}`, 'success', 5000);
    addLog('sync', `Linked & revised: ${p.title?.slice(0,50)}`, `Amazon: ${cleanUrl.slice(0,60)}`, { productId: p.id });
    renderOrderRows(); // re-render to show the Amazon link
  } catch(e) {
    if (btn) { btn.textContent = 'Link & Resync'; btn.disabled = false; }
    toast(`Failed: ${e.message}`, 'error', 6000);
  }
}

async function recoverSkusFromEbay() {
  if (!S.token) { toast('Connect eBay first', 'error'); return; }
  toast('🔧 Fetching SKUs from eBay — may take 30s…', 'info', 5000);
  try {
    const token = await ensureToken();
    const r = await fetch(`${S.backendUrl}/api/ebay?action=recoverSkus`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: token }),
    });
    const d = await r.json();
    if (!d.skuMap) throw new Error(d.error || 'Failed to fetch SKUs');
    let updated = 0;
    for (const p of S.products) {
      if (!p.ebayListingId) continue;
      const realSku = d.skuMap[p.ebayListingId];
      if (realSku && p.ebaySku !== realSku) {
        p.ebaySku = realSku;
        updated++;
      }
    }
    save();
    toast(`✅ Recovered ${updated} SKUs from ${d.total} eBay listings`, 'success', 4000);
    addLog('info', `SKU Recovery`, `Updated ${updated} SKUs from eBay`);
  } catch(e) { toast(`SKU recovery failed: ${e.message}`, 'error', 5000); }
}

async function loadPolicies() {
  if (!S.token || !S.backendUrl) return;
  try {
    const token = await ensureToken();
    const r = await fetch(`${S.backendUrl}/api/ebay?action=policies`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: token, sandbox: S.sandboxMode || false }),
    });
    const d = await r.json();
    const populate = (selId, items, savedId, idKey, nameKey) => {
      const sel = $(selId); if (!sel) return;
      const opts = items.map(i => `<option value="${i[idKey]}" ${i[idKey]===savedId?'selected':''}>${i[nameKey]}</option>`).join('');
      sel.innerHTML = `<option value="">Auto-select</option>${opts}`;
    };
    populate('fp-sel', d.fulfillment||[], S.fulfillmentPolicyId, 'id', 'name');
    populate('pp-sel', d.payment||[], S.paymentPolicyId, 'id', 'name');
    populate('rp-sel', d.return||[], S.returnPolicyId, 'id', 'name');
  } catch (e) { console.warn('loadPolicies:', e.message); }
}

// ══════════════════════════════════════════════════════
// 24/7 SERVER MONITOR
// ══════════════════════════════════════════════════════
async function registerMonitor() {
  if (!S.monitor24h || !S.token || !S.backendUrl || !S.refreshToken) return;
  const tracked = (S.products||[]).filter(p => p.status==='listed' && p.sourceUrl && p.ebaySku);
  if (!tracked.length) return;
  try {
    const r = await fetch(`${S.backendUrl}/api/monitor?action=register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ products: tracked, refresh_token: S.refreshToken, markup: S.markup, quantity: S.quantity })
    });
    const d = await r.json();
    if (d.success) {
      S.monitorLastReg = new Date().toISOString();
      save();
      console.log('[Monitor] registered', d.tracked, 'products for 24/7 monitoring');
    }
  } catch(e) { console.warn('[Monitor] register failed:', e.message); }
}

async function toggleMonitor24h() {
  if (!S.backendUrl) { toast('Set Backend URL in Settings first', 'error'); return; }
  if (!S.token) { toast('Connect eBay first', 'error'); return; }
  if (!S.refreshToken) { toast('Please reconnect eBay to enable 24/7 monitoring (need refresh token)', 'warn', 5000); return; }
  S.monitor24h = true;
  save();
  const btn = $('monitor-btn');
  if (btn) btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px"><div class="spinner" style="width:10px;height:10px"></div> Registering…</span>';
  await registerMonitor();
  toast('✅ 24/7 monitoring enabled — your listings are tracked every hour even when offline!', 'success', 6000);
  renderSettings();
}

function disableMonitor24h() {
  S.monitor24h = false; S.monitorLastReg = null;
  save(); renderSettings();
  toast('24/7 monitoring disabled', 'info');
}

async function checkMonitorStatus() {
  if (!S.backendUrl) return;
  try {
    const r = await fetch(`${S.backendUrl}/api/monitor?action=status`);
    const d = await r.json();
    if (!d.registered) { toast('No products registered yet — click Enable Now', 'warn'); return; }
    const lastRun = d.lastRun ? timeAgo(d.lastRun) : 'never';
    const sum = d.lastSummary;
    const msg = sum
      ? `Last run ${lastRun}: ${sum.ran} checked · ${sum.priceUpdates} price updates · ${sum.stockUpdates} stock updates`
      : `${d.tracked} products registered · last run: ${lastRun}`;
    toast('📊 ' + msg, 'info', 7000);
    // Inject last run results into logs
    if (d.lastResults?.length) {
      for (const r of d.lastResults) {
        if (r.priceChanges?.length) addLog('price', `[Server] Price updated: ${r.title}`, r.priceChanges.join(' · '), { changes: r.priceChanges });
        if (r.stockChanges?.length) addLog('stock', `[Server] Stock updated: ${r.title}`, r.stockChanges.join(' · '), { changes: r.stockChanges });
        if (r.wentOos) addLog('stock', `[Server] ⚠️ OOS: ${r.title}`, 'qty → 0 on eBay', {});
      }
      save();
      if (S.view === 'logs') renderLogs();
    }
  } catch(e) { toast('Could not reach monitor: ' + e.message, 'error'); }
}

// ══════════════════════════════════════════════════════
// AUTO SYNC
// ══════════════════════════════════════════════════════
let _syncTimer = null;
function setupAutoSync() {
  if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
  if (S.autoSync && S.token && S.backendUrl) {
    _syncTimer = setInterval(async () => {
      const listed = (S.products||[]).filter(p => p.status==='listed' && p.sourceUrl);
      if (!listed.length) return;
      console.log('[AutoSync] syncing', listed.length, 'products');
      let totalPriceChanges = 0, totalStockChanges = 0, totalOos = 0;

      for (const p of listed.slice(0, 20)) {
        try {
          const token = await ensureToken();
          const r = await fetch(`${S.backendUrl}/api/ebay?action=sync`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: token, ebaySku: p.ebaySku, sourceUrl: p.sourceUrl, hasVariations: p.hasVariations, quantity: p.quantity, variations: p.variations }),
          });
          const d = await r.json();
          if (d.success) {
            p.lastSynced = new Date().toISOString();

            // Log price changes
            if (d.priceChanges?.length) {
              totalPriceChanges += d.priceChanges.length;
              addLog('price', `Price updated: ${p.title.slice(0,40)}`, d.priceChanges.join(' · '), { productId: p.id, changes: d.priceChanges });
            }
            // Log stock/OOS changes
            if (d.stockChanges?.length) {
              totalStockChanges += d.stockChanges.length;
              addLog('stock', `Stock updated: ${p.title.slice(0,40)}`, d.stockChanges.join(' · '), { productId: p.id, changes: d.stockChanges });
            }
            if (d.wentOos) {
              totalOos++;
              addLog('stock', `⚠️ Out of stock: ${p.title.slice(0,40)}`, 'Listing paused on eBay', { productId: p.id });
            }
            // Log a sync heartbeat every time (so logs show monitoring is active)
            if (!d.priceChanges?.length && !d.stockChanges?.length && !d.wentOos) {
              addLog('sync', `Monitored: ${p.title.slice(0,40)}`, `No changes · last price $${(p.myPrice||0).toFixed(2)}`, { productId: p.id });
            }
          }
        } catch(e) {
          addLog('error', `Auto-sync failed: ${p.title.slice(0,40)}`, e.message, { productId: p.id });
        }
        await new Promise(r => setTimeout(r, 800));
      }

      S.lastAutoSync = new Date().toISOString();
      save();
      if (S.view === 'products') renderProducts();
      if (S.view === 'logs') renderLogs();

      // Summary toast if anything changed
      if (totalPriceChanges || totalStockChanges || totalOos) {
        const parts = [];
        if (totalPriceChanges) parts.push(`${totalPriceChanges} price update${totalPriceChanges>1?'s':''}`);
        if (totalStockChanges) parts.push(`${totalStockChanges} stock update${totalStockChanges>1?'s':''}`);
        if (totalOos) parts.push(`${totalOos} went OOS`);
        toast(`🔄 Auto-sync: ${parts.join(', ')}`, 'info', 5000);
      }
    }, 20 * 60 * 1000); // every 20 min
  }
}

// ══════════════════════════════════════════════════════
// STATUS BAR
// ══════════════════════════════════════════════════════
function updateStatus() {
  const dot = $('sdot'), txt = $('stext');
  if (!dot || !txt) return;
  if (!S.token) { dot.className = 'dot red'; txt.textContent = 'Not connected'; }
  else if (Date.now() > S.tokenExpiry) { dot.className = 'dot amber'; txt.textContent = 'Token expired'; }
  else { dot.className = 'dot green'; txt.textContent = 'eBay connected'; }
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
updateStatus();
setupAutoSync();
nav(S.view || 'import');
// Auto-register with server monitor on every page load (keeps product list fresh)
setTimeout(registerMonitor, 3000);
